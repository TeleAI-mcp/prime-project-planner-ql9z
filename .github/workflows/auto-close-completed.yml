name: Auto-close completed issues

on:
  issues:
    types: [labeled, unlabeled]

jobs:
  close-completed:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues with 'completed' label
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.label && context.payload.label.name === 'completed') {
              if (context.payload.issue.state === 'open') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  state: 'closed'
                })
                console.log(`Closed issue #${context.payload.issue.number}`)
              }
            }
